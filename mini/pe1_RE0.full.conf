protocols {
    bgp {
        group EBGP {
            type external;
            peer-as 1;
            neighbor 100.100.0.2;
        }
        group bgp-feed {
            type external;
            multihop;
            import LIMIT-ROUTES;
            family inet {
                any;
            }
            export deny-all;
            peer-as 10458;
            local-as 69;
            neighbor 192.168.69.71;
        }
    }
    isis {
        apply-groups GR-ISIS-KC;
        interface et-0/0/1.0 {
            level 2 metric 10;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
        traceoptions {
            file isis.log size 100m world-readable;
            flag hello;
            flag packets;
            flag all;
        }
        export PS-ISIS-EXPORT;
    }
    lldp {
        port-id-subtype interface-name;
        interface all {
            enable;
        }
        interface re0:mgmt-0 {
            disable;
        }
        interface re1:mgmt-0 {
            disable;
        }
    }
}
