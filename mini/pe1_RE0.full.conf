    interface re0:mgmt-0.0;
    community public {
        authorization read-only;
    }
    community private {
        authorization read-write;
    }
}
policy-options {
    policy-statement LIMIT-ROUTES {
        term 1 {
            from {
                route-filter 1.0.0.0/8 orlonger;
            }
            then accept;
        }
        then reject;
    }
    policy-statement PS-ISIS-EXPORT {
        term STATIC {
            from {
                route-filter 6.6.6.6/32 exact;
            }
            then accept;
        }
    }
    policy-statement deny-all {
        then reject;
    }
}
