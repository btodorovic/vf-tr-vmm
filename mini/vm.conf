#include "/vmm/bin/common.defs"
#include "/vmm/data/user_disks/vptxc/common.evovscapa.defs"
#include "/vmm/data/user_disks/vmxc/common.vmx.p3.defs"

#define EVOVPTX_IMG "/vmm/data/user_disks/btodorovic/junos-evo-install-ptx-x86-64-24.4R2-S3.7-EVO.iso"
#define VMX_DISK basedisk "/vmm/data/user_disks/btodorovic/junos-x86-64-25.2R1.9.vmdk";
#define VRR_DISK basedisk "/vmm/data/user_disks/btodorovic/junos-x86-64-25.2R1.9.vmdk";
#define XRV_DISK bootdisk "/vmm/data/user_disks/btodorovic/xrv9k-fullk9-x-7.9.2.vmdk";

#define EVOVPTX_FPC_CSPP_IMG "/vmm/data/base_disks/junos/vevo/ubuntu_vm_evo.qcow2"
#define VMM_ENV_CSPP_CFG_DIR  /vmm/data/user_disks/evo_test/EVOvSCAPA/
#define RE_I2CID  0x0CA3 /* Doon RCB: I2C_ID_JNP10K_RCB */
#define RE_BOOT_ARGS   " " /* Unused; for future expansion. */
#define FPC_BOOT_ARGS   " " /* Unused; for future expansions. */
#define PTX_CHAS_I2CID     240  /* JNX_PRODUCT_PTX10008 = 240 */
#define FPC_I2CID  0x0D07 /* I2C_ID_JNP10K_36QDD_LC */
#define VMX_CHASSIS_I2CID   21  /* MX960 */

#define EVO_DEVELOPER_FILES \
        install "ENV(CONFIG_BASE)/evo-mount/yp.conf" "/etc/yp.conf";  \
        install "ENV(CONFIG_BASE)/evo-mount/auto.evo" "/etc/auto.evo"; \
        install "ENV(CONFIG_BASE)/evo-mount/auto.evofiler" "/etc/auto.evofiler"; \
        install "ENV(CONFIG_BASE)/evo-mount/auto.master" "/etc/auto.master";  \
        install "ENV(CONFIG_BASE)/evo-mount/nisdomainname" "/etc/nisdomainname";   \
        install "ENV(CONFIG_BASE)/evo-mount/nsswitch.conf" "/etc/nsswitch.conf";   \
        install "/vmm/data/vmm-configs/common/vptxc/rc.vmm" "/var/vmguest/rc.vmm";   \
        install "ENV(CONFIG_BASE)/evo-mount/ssh_host_rsa_key" "/home/root/.ssh/ssh_host_rsa_key"; \
        install "ENV(CONFIG_BASE)/evo-mount/ssh_host_rsa_key.pub" "/home/root/.ssh/ssh_host_rsa_key.pub"; \
        install "/homes/btodorovic/vmm_config/key.txt" "/root/olive.conf";

// Change this to name your config to anything you like
EVOVPTX_TOPOLOGY_START_ (Evo_vScapa_Testbed)

//
// - pe1
//
    #undef  PTX_CHAS_NAME
    #define PTX_CHAS_NAME      pe1

    EVOVPTX_CHASSIS_START_ (PTX_CHAS_NAME)

        EVOVPTX_RE_START_ (PTX_CHAS_NAME, EVOVPTX_RE0)
            EVOVPTX_RE0_INSTANCE_ISO_AUTODISK (PTX_CHAS_NAME, PTX_CHAS_I2CID, EVOVPTX_IMG,
                                               EVOVPTX_RE0, RE_I2CID, RE_BOOT_ARGS)
        EVO_DEVELOPER_FILES
        EVOVPTX_RE_END_

        EVOVPTX_FPC_START_ (PTX_CHAS_NAME, EVOVPTX_FPC0)
            EVOVPTX_FPC_INSTANCE_DISKLESS (PTX_CHAS_NAME, PTX_CHAS_I2CID, EVOVPTX_RE0,
                                           EVOVPTX_FPC0, FPC_I2CID, FPC_BOOT_ARGS)
        EVOVPTX_FPC_END_

        EVOVPTX_FPC_CSPP_START_ (PTX_CHAS_NAME, EVOVPTX_FPC0)
            EVOVPTX_FPC_CSPP_INSTANCE (PTX_CHAS_NAME, EVOVPTX_FPC0, EVOVPTX_FPC_CSPP_IMG)
            // Do not delete the below comment line.  It is necessary for launchHelix/helixCreatord
            // install "/volume/evo/files/public/evo_test/evo-devtest/tools/launchHelix/VPTX/COSIMPP/cosim_pp.conf" "/var/tmp/cosim_pp.conf";
            EVOVPTX_INSTALL_FPC_CSPP_BUNDLE_SCAPA (VMM_ENV_CSPP_CFG_DIR)
            EVOVPTX_CONNECT (IF_ET (0,0,1), private1) // pe1 - pe2
            EVOVPTX_CONNECT (IF_ET (0,0,3), private3) // pe1 - pe2
            EVOVPTX_CONNECT (IF_ET (0,0,5), private5) // pe1 - tgw
            EVOVPTX_CONNECT (IF_ET (0,0,7), private7) // pe1 - tgw
            EVOVPTX_CONNECT (IF_ET (0,0,9), dead)     // UNUSED
        EVOVPTX_FPC_CSPP_END_

    EVOVPTX_CHASSIS_END_

//
// - tgw
//
    #undef VMX_CHASSIS_NAME
    #define VMX_CHASSIS_NAME    tgw

    VMX_CHASSIS_START()
        VMX_RE_START(tgw, 0)
            VMX_RE_INSTANCE(tgw, VMX_DISK, VMX_RE_I2CID, 0)
            install "/vmm/data/user_disks/btodorovic/vmm_config/my.base.systest.conf" "/root/junos.base.conf";
            install "/homes/btodorovic/vmm_config/key.txt" "/root/olive.conf";
            memory 8192;
        VMX_RE_END

        VMX_MPC_START(tgw_MPC, 0)
            VMX_MPC_INSTANCE(tgw_MPC, VMX_DISK, VMX_MPC_I2CID, 0)
            VMX_CONNECT(GE(0,0,1), private9) // tgw - rr1
            VMX_CONNECT(GE(0,0,5), private5) // tgw - pe1
            VMX_CONNECT(GE(0,0,7), private7) // tgw - pe1
        VMX_MPC_END
    VMX_CHASSIS_END

//
// - rr1
//
    #undef VMX_CHASSIS_NAME
    #define VMX_CHASSIS_NAME    rr1

    VMX_CHASSIS_START()
        VMX_RE_START(rr1, 0)
            VMX_RE_INSTANCE(rr1, VRR_DISK, VMX_RE_I2CID, 0)
            install "/vmm/data/user_disks/btodorovic/vmm_config/my.base.systest.conf" "/root/junos.base.conf";
            install "/homes/btodorovic/vmm_config/key.txt" "/root/olive.conf";
            memory 8192;
        VMX_RE_END

        VMX_MPC_START(rr1_MPC, 0)
            VMX_MPC_INSTANCE(rr1_MPC, VRR_DISK, VMX_MPC_I2CID, 0)
            VMX_CONNECT(GE(0,0,1), private9) // rr1 - pe1
        VMX_MPC_END
    VMX_CHASSIS_END

// - R022_Internet - Cisco-IOS-XRv

    vm "pe2" {
        hostname "pe2" ;
        memory 12288;
        ncpus 4;
        XRV_DISK
        setvar "+qemu_args" "-smbios type=1,manufacturer=cisco";
        setvar "+qemu_args" " -cpu host";
        setvar "use_dhcp" "1";
        interface "em0" { bridge "external"; }; // MgmtEth0/0/CPU0/0
        interface "em1" { bridge "dead"; };     // UNUSED
        interface "em2" { bridge "dead"; };     // UNUSED
        interface "em3" { bridge "dead"; };     // Gi0/0/0/0
        interface "em4" { bridge "private1"; }; // Gi0/0/0/1
        interface "em5" { bridge "dead"; };     // Gi0/0/0/2
        interface "em6" { bridge "private3"; }; // Gi0/0/0/3
    };

EVOVPTX_TOPOLOGY_END_
