version 24.4R2-S3.7-EVO;
groups {
    GR-IFD-SPEED {
        interfaces {
            <et-*> {
                speed 400g;
            }
        }
    }
    GR-ISIS {
        protocols {
            isis {
                interface <*e*> {
                    level 1 disable;
                    level 2 {
                        post-convergence-lfa {
                            node-protection cost 16777214;
                            srlg-protection;
                        }
                        metric 16777215;
                        hello-authentication-key-chain KC-ISIS-HELLO;
                    }
                    lsp-interval 10;
                    point-to-point;
                }
                level 1 disable;
                level 2 {
                    authentication-key-chain KC-ISIS-LSP;
                    wide-metrics-only;
                }
                backup-spf-options {
                    use-post-convergence-lfa maximum-labels 8;
                    use-source-packet-routing;
                    per-prefix-calculation;
                }
                lsp-lifetime 65535;
                no-ipv6-routing;
                overload timeout 300;
            }
        }
    }
    GR-L3VPN {
        routing-instances {
            <*> {
                instance-type vrf;
                routing-options {
                    router-id 100.64.0.5;
                    static {
                        route 0.0.0.0/0 {
                            discard;
                            retain;
                            no-readvertise;
                            preference 4294967295;
                        }
                    }
                    auto-export;
                }
                vrf-table-label;
            }
        }
    }
    GR-SYSLOG {
        system {
            syslog {
                host <*> {
                    authorization any;
                    cron any;
                    daemon any;
                    kernel any;
                    user any;
                    change-log any;
                    interactive-commands any;
                    log-prefix jpe1;
                    source-address 100.64.0.5;
                    routing-instance mgmt_junos;
                    explicit-priority;
                }
            }
        }
    }
}
