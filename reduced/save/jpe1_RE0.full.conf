routing-options {
    router-id 100.64.0.5;
    autonomous-system 15924;
    rib-groups {
        RG-INTERNET-TO-GRT {
            import-rib [ INTERNET.inet.0 inet.0 ];
            import-policy PS-INTERNET-TO-GRT;
        }
        RG-GRT-TO-INTERNET {
            import-rib [ inet.0 INTERNET.inet.0 ];
            import-policy PS-GRT-TO-INTERNET;
        }
    }
    forwarding-table {
        export PS-LOAD-BALANCE;
        chained-composite-next-hop {
            ingress {
                l2vpn;
                l2ckt;
                fec129-vpws;
                evpn;
                labeled-bgp {
                    inet6;
                }
            }
        }
    }
}
