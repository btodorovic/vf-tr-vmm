            }
            family inet6-vpn {
                unicast;
            }
            family l2vpn {
                signaling;
            }
            family evpn {
                signaling;
            }
            peer-as 15924;
            neighbor 100.64.0.1;
            neighbor 100.64.0.3;
            vpn-apply-export;
        }
