policy-options {
    policy-statement PS-BGP-NHS {
        term BGP {
            from protocol bgp;
            then {
                next-hop self;
                accept;
            }
        }
    }
    policy-statement PS-EBGP-PEER-EXPORT {
        term EXPORT {
            from {
                protocol static;
                tag 30;
            }
            then accept;
        }
        then reject;
    }
    policy-statement PS-EBGP-PEER-IMPORT {
        term IMPORT {
            then {
                community add CM-PEER;
            }
        }
    }
    policy-statement PS-GRT-TO-INTERNET {
        term CUSTOMERS {
            from community CM-MOBILE;
            then accept;
        }
        then reject;
    }
    policy-statement PS-IBGP-TGW-EXPORT {
        term EXPORT {
            from community CM-TGW;
            then reject;
        }
        term OTHER-ROUTES {
            from protocol [ bgp static ];
            then {
                next-hop self;
                accept;
            }
        }
    }
    policy-statement PS-IBGP-TGW-IMPORT {
        term TAG-TGW-ROUTES {
            then {
                community add CM-TGW;
                accept;
            }
        }
    }
    policy-statement PS-INTERNET-TO-GRT {
        term PEERS {
            from community CM-PEER;
            then accept;
        }
        then reject;
    }
    policy-statement PS-LOAD-BALANCE {
        term NO-ISIS-ECMP {
            from protocol isis;
            then accept;
        }
        term OTHER {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement PS-MGMT-EXPORT {
        term EXPORT {
            from {
                route-filter 100.100.100.0/24 exact;
            }
            then accept;
        }
        then reject;
    }
    policy-statement VRF-INTERNET-EXPORT {
        term EXPORT {
            then {
                community add RT-INTERNET;
                accept;
            }
        }
    }
    policy-statement VRF-INTERNET-IMPORT {
        term IMPORT {
            from community RT-INTERNET;
            then {
                local-preference 50;
                accept;
            }
        }
        then reject;
    }
    policy-statement VRF-VFNETMNG-EXPORT {
        term EXPORT {
            from {
                protocol direct;
                route-filter 100.127.0.5/32 exact;
            }
            then {
                community add RT-VFNETMNG;
                accept;
            }
        }
        then reject;
    }
    policy-statement VRF-VFNETMNG-IMPORT {
        term IMPORT {
            from community RT-VFNETMNG;
            then accept;
        }
        then reject;
    }
    community CM-MOBILE members 15924:1;
    community CM-PEER members 15924:2;
    community CM-TGW members 15924:0;
    community RT-INTERNET members target:15924:1;
    community RT-VFNETMNG members target:15924:1723;
}
