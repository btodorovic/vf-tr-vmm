}
policy-options {
    policy-statement PS-SRV-EXPORT {
        term SRV {
            from {
                protocol direct;
                rib inet.0;
                route-filter 100.100.100.0/24 exact;
            }
            then {
                next-hop self;
                accept;
            }
        }
    }
    policy-statement VRF-VFNETMNG-EXPORT {
        term EXPORT {
            then {
                community add RT-VFNETMNG;
                accept;
            }
        }
    }
    policy-statement VRF-VFNETMNG-IMPORT {
        term IMPORT {
            from community RT-VFNETMNG;
            then accept;
        }
        then reject;
    }
    community RT-VFNETMNG members target:15924:1723;
}
routing-instances {
    VFNETMNG {
        instance-type vrf;
        interface ge-0/0/2.20;
        interface lo0.1500;
        route-distinguisher 100.127.0.254:1723;
        vrf-import VRF-VFNETMNG-IMPORT;
        vrf-export VRF-VFNETMNG-EXPORT;
        vrf-table-label;
    }
    mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 next-hop 10.54.159.254;
            }
        }
    }
}
routing-options {
    autonomous-system 15924;
}
protocols {
    bgp {
        group rr {
            type internal;
            local-address 100.64.0.254;
            family inet {
                unicast;
            }
            family inet-vpn {
                unicast;
            }
            family inet6 {
                labeled-unicast;
            }
            family inet6-vpn {
                unicast;
            }
            export PS-SRV-EXPORT;
            peer-as 15924;
            neighbor 100.64.0.1;
            neighbor 100.64.0.3;
            vpn-apply-export;
        }
    }
    isis {
        interface ge-0/0/1.10 {
            level 1 disable;
            level 2 metric 100000;
            point-to-point;
        }
