    community public {
        authorization read-only;
    }
    community private {
        authorization read-write;
    }
}
policy-options {
    policy-statement PS-BGP-NHS {
        term BGP {
            from protocol bgp;
            then {
                next-hop self;
                accept;
            }
        }
    }
    policy-statement PS-MGMT-EXPORT {
        term Lo0 {
            from interface lo0.0;
            then {
                next-hop self;
                accept;
            }
        }
    }
    policy-statement PS-STATIC-TO-BGP {
        term STATIC {
            from {
                family inet;
                protocol static;
                route-filter 100.0.0.0/8 orlonger;
            }
            then accept;
        }
        term STATICv6 {
            from {
                family inet6;
                route-filter 2001:cafe::/32 orlonger;
            }
            then accept;
        }
    }
}
routing-options {
    rib inet6.0 {
        static {
            route 2001:cafe::/32 discard;
        }
    }
    router-id 100.64.0.12;
    autonomous-system 15924;
    static {
        route 10.0.0.0/8 {
            next-hop 10.54.159.254;
            retain;
            no-readvertise;
        }
        route 66.129.255.62/32 {
            next-hop 10.54.159.254;
            retain;
            no-readvertise;
        }
        route 100.0.0.0/8 discard;
        route 172.16.0.0/12 {
            next-hop 10.54.159.254;
            retain;
            no-readvertise;
        }
    }
}
protocols {
    bgp {
        group IBGP {
            type internal;
            local-address 100.64.0.12;
            export PS-BGP-NHS;
            neighbor 100.64.0.11;
        }
        group IBGP-PE {
            type internal;
            export [ PS-MGMT-EXPORT PS-BGP-NHS ];
            cluster 100.64.0.12;
            peer-as 15924;
            neighbor 100.100.14.1;
            neighbor 2001:cafe:100:14::1 {
                family inet6 {
                    unicast;
                }
            }
        }
        group EBGP-VGN {
            type external;
            export PS-STATIC-TO-BGP;
            peer-as 1273;
            neighbor 100.100.25.2;
            neighbor 2001:cafe:100:25::2 {
                family inet6 {
                    unicast;
                }
            }
        }
    }
    isis {
        interface ge-0/0/2.0 {
            level 2 metric 1000;
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
    }
    ldp {
        track-igp-metric;
        transport-address router-id;
        interface ge-0/0/2.0;
        interface lo0.0;
    }
    mpls {
        interface lo0.0;
        interface ge-0/0/2.0;
    }
    lldp {
        port-id-subtype interface-name;
        port-description-type interface-description;
        interface fxp0 {
            disable;
        }
        interface all {
            enable;
        }
    }
}
