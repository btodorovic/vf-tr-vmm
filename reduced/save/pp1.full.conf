snmp {
    location Gondwana;
    interface fxp0.0;
    community public {
        authorization read-only;
    }
    community private {
        authorization read-write;
    }
}
policy-options {
    policy-statement PS-LOAD-BALANCE {
        term NO-ISIS-ECMP {
            from protocol isis;
            then accept;
        }
        term OTHER {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement VRF-VFNETMNG-EXPORT {
        term EXPORT {
            from {
                protocol direct;
                route-filter 100.127.0.2/32 exact;
            }
            then {
                community add RT-VFNETMNG;
                accept;
            }
        }
        then reject;
    }
    policy-statement VRF-VFNETMNG-IMPORT {
        term IMPORT {
            from community RT-VFNETMNG;
            then accept;
        }
        then reject;
    }
    community RT-VFNETMNG members target:15924:1723;
}
routing-instances {
    VFNETMNG {
        instance-type vrf;
        interface lo0.1500;
        route-distinguisher 100.127.0.2:1723;
        vrf-import VRF-VFNETMNG-IMPORT;
        vrf-export VRF-VFNETMNG-EXPORT;
        vrf-table-label;
    }
    mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 next-hop 10.54.159.254;
            }
        }
    }
}
routing-options {
    router-id 100.64.0.2;
    static {
        route 100.100.100.0/24 next-hop 100.100.91.2;
    }
    forwarding-table {
        export PS-LOAD-BALANCE;
        chained-composite-next-hop {
            ingress {
                l2vpn;
                l2ckt;
                fec129-vpws;
                evpn;
                labeled-bgp {
                    inet6;
                }
            }
        }
    }
}
