key = "Embe1mpls"
accounting file = /var/log/tac.acct
# authentication users not appearing elsewhere via
# the file /etc/passwd
#default authentication = file /etc/passwd

acl = default	{
		permit = 100\.127\.0\.
}
	
# Group that is allowed to do most configuration on all interfaces etc.
group = full_access {
	service = exec {
		priv-lvl = 15
	}	
	service = junos-exec {
		local-user-name = remote
	}	
}

group = limited_access {
	service = exec {
		priv-lvl = 7
	}	
	service = junos-exec {
		local-user-name = limitedaccess
	}	
}

group = readonly {
	service = exec {
		priv-lvl = 1
	}	
	service = junos-exec {
		local-user-name = readonly
	}	
}

user = beri {
	login = PAM
	member = full_access
}

user = limited {
        # Cleartext: 00Embe1mpls
	login = des 7AjtLpa5O5gqI
	member = limited_access
}

user = ro {
        # Cleartext: 00Embe1mpls
	login = des 7AjtLpa5O5gqI
	member = readonly
}
