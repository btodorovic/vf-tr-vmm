interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 100.0.0.1/32;
            }
            family inet6 {
                address 2001:cafe::1/128;
            }
            family iso {
                address 49.0001.0001.6400.0001.00;
            }
	    family mpls;
        }
    }
    ge-0/0/1 {
        description "private0 :: rr1 -- pp1";
        unit 0 {
            family inet {
                address 100.1.0.1/30;
            }
            family inet6 {
                address 2001:cafe:1::1/64;
            }
            family iso;
            family mpls;
        }
    }
}
protocols {
    isis {
        level 1 disable;
        level 2 wide-metrics-only;
        interface lo0.0 passive;
        interface ge-0/0/1.0  point-to-point level 2 metric 1000;
    }
}
protocols {
    mpls {
        interface lo0.0;
        interface ge-0/0/1.0;
    }
}
protocols {
    ldp {
        transport-address router-id;
        track-igp-metric;
        interface lo0.0;
        interface ge-0/0/1.0;
    }
}
system {
    static-host-mapping {
        ce1 {
            inet [  100.0.0.6  100.1.0.18  100.1.0.25  ];
            inet6 [  2001:cafe::6  2001:cafe:1:4::2  2001:cafe:1:6::1  ];
        }
        ce2 {
            inet [  100.0.0.7  100.1.0.22  100.1.0.26  ];
            inet6 [  2001:cafe::7  2001:cafe:1:5::2  2001:cafe:1:6::2  ];
        }
        pe1 {
            inet [  100.0.0.4  100.1.0.10  100.1.0.17  ];
            inet6 [  2001:cafe::4  2001:cafe:1:2::2  2001:cafe:1:4::1  ];
        }
        pe2 {
            inet [  100.0.0.5  100.1.0.14  100.1.0.21  ];
            inet6 [  2001:cafe::5  2001:cafe:1:3::2  2001:cafe:1:5::1  ];
        }
        pp1 {
            inet [  100.0.0.2  100.1.0.2  100.1.0.5  100.1.0.9  ];
            inet6 [  2001:cafe::2  2001:cafe:1::2  2001:cafe:1:1::1  2001:cafe:1:2::1  ];
        }
        pp2 {
            inet [  100.0.0.3  100.1.0.6  100.1.0.13  ];
            inet6 [  2001:cafe::3  2001:cafe:1:1::2  2001:cafe:1:3::1  ];
        }
        rr1 {
            inet [  100.0.0.1  100.1.0.1  ];
            inet6 [  2001:cafe::1  2001:cafe:1::1  ];
        }
    }
}
routing-options {
    router-id 100.0.0.1;
}
system {
    root-authentication {
        ssh-rsa "ssh-rsa AAAAB3NzaC1yc2EAAAABIwAAAIEAndoan2TzmZp3J3UJjlXksF1DcJhntlLTs9mEVkY/0sTXTgqe75cVB9cwOY8Vsj9l3p6yOpO0cMwbxiWmLmnYzBDoeyTAKzFLr/Ccdm0NhMLFnP/pyewShQJNOJLPCERNxAWCQlrQnXE+UvqrY45fOQc4NnHhggBK3IdB6AcHOn8=";
    }
    services ssh root-login allow;
}
routing-options {
    autonomous-system 15924;
}
protocols {
    bgp {
        group rrc {
            type internal;
            peer-as 15924;
            local-address 100.0.0.1;
            cluster 100.0.0.1;
            family inet {
                unicast;
            }
            family inet-vpn {
                unicast;
            }
            family inet6 {
                labeled-unicast;
            }
            family inet6-vpn {
                unicast;
            }
            family l2vpn {
                signaling;
            }
            family evpn {
                signaling;
            }

            neighbor 100.0.0.4;
            neighbor 100.0.0.5;
        }
    }
}
