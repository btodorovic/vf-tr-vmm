                        origin igp;
                    }
                }
            }
        }
        protocols {
            bgp {
                group EBGP {
                    type external;
                    export PS-STATIC-TO-BGP;
                    peer-as 15924;
                    neighbor 100.4.0.1;
                }
            }
        }
        interface lt-0/3/0.2;
    }
}
