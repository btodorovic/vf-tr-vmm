policy-options {
    policy-statement PS-CE-EXPORT {
        term EXPORT {
            from community TGW;
            then reject;
        }
        term OTHER {
            from protocol [ bgp static ];
            then {
                next-hop self;
                accept;
            }
        }
    }
    policy-statement PS-STATIC-TO-BGP {
        term STATIC {
            from protocol static;
            then accept;
        }
    }
    policy-statement VRF-INTERNET-EXPORT {
        term EXPORT {
            then {
                community add RT-INTERNET;
                accept;
            }
        }
    }
    policy-statement VRF-INTERNET-IMPORT {
        term IMPORT {
            from community RT-INTERNET;
            then {
                local-preference 80;
                accept;
            }
        }
        then reject;
    }
    community RT-INTERNET members target:15924:1;
    community TGW members 15924:0;
}
routing-instances {
    INTERNET {
        instance-type vrf;
        routing-options {
            router-id 100.0.0.5;
        }
        protocols {
            bgp {
                group CE {
                    type internal;
                    export PS-CE-EXPORT;
                    neighbor 100.1.0.22 {
                        local-address 100.1.0.21;
                    }
                }
                group META {
                    type external;
                    export PS-STATIC-TO-BGP;
                    peer-as 32394;
                    neighbor 100.4.0.2;
                }
            }
        }
        interface ge-0/0/2.0;
        interface lt-0/3/0.1;
        route-distinguisher 100.0.0.5:1;
        vrf-import VRF-INTERNET-IMPORT;
        vrf-export VRF-INTERNET-EXPORT;
        vrf-table-label;
    }
    META {
