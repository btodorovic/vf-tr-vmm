policy-options {
    policy-statement PS-IBGP-EXPORT {
        term BGP {
            from protocol bgp;
            then {
                next-hop self;
            }
        }
    }
    policy-statement PS-PE-EXPORT {
        term BGP {
            from protocol bgp;
            then {
                community add TGW;
                next-hop self;
                accept;
            }
        }
    }
    policy-statement PS-STATIC-TO-BGP {
        term STATIC {
            from protocol static;
            then accept;
        }
    }
    community TGW members 15924:0;
}
routing-instances {
    CACHE {
        instance-type virtual-router;
        routing-options {
            autonomous-system {
                1;
                independent-domain {
                    no-attrset no-as-prepend;
                }
            }
            static {
                route 200.200.0.0/16 {
                    discard;
                    as-path {
                        path "222 333";
                        origin igp;
                    }
                }
            }
        }
        protocols {
            bgp {
                group EBGP {
                    type external;
                    export PS-STATIC-TO-BGP;
                    peer-as 15924;
                    neighbor 100.2.0.1;
                }
            }
        }
        interface lt-0/3/0.2;
    }
}
