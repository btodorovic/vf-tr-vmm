interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 100.0.0.1/32;
            }
            family inet6 {
                address 2001:cafe::1/128;
            }
            family iso {
                address 49.0001.0001.6400.0001.00;
            }
	    family mpls;
        }
    }
    ge-0/0/1 {
        description "private0 :: rrf -- pp1";
        unit 0 {
            family inet {
                address 100.1.0.1/30;
            }
            family inet6 {
                address 2001:cafe:1::1/64;
            }
            family iso;
            family mpls;
        }
    }
    ge-0/0/2 {
        description "private1 :: rrf -- pp2";
        unit 0 {
            family inet {
                address 100.1.0.5/30;
            }
            family inet6 {
                address 2001:cafe:1:1::1/64;
            }
            family iso;
            family mpls;
        }
    }
}
protocols {
    isis {
        level 1 disable;
        level 2 wide-metrics-only;
        interface lo0.0 passive;
        interface ge-0/0/1.0  point-to-point level 2 metric 1000;
        interface ge-0/0/2.0  point-to-point level 2 metric 1000;
    }
}
protocols {
    mpls {
        interface lo0.0;
        interface ge-0/0/1.0;
        interface ge-0/0/2.0;
    }
}
protocols {
    ldp {
        transport-address router-id;
        track-igp-metric;
        interface lo0.0;
        interface ge-0/0/1.0;
        interface ge-0/0/2.0;
    }
}
