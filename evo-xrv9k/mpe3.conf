hostname mpe3
!
interface Loopback0
 ipv4 address 100.0.0.16 255.255.255.255
 ipv6 address 2001:cafe::10/128
!
interface GigabitEthernet0/0/0/1
 description private23 :: mpe3 -- jpe3
 ipv4 address 100.1.0.94/30
 ipv6 address 2001:cafe:1:17::2/64
!
interface GigabitEthernet0/0/0/2
 description private25 :: mpe3 -- pp3
 ipv4 address 100.1.0.102/30
 ipv6 address 2001:cafe:1:19::2/64
!
interface GigabitEthernet0/0/0/3
 description private27 :: mpe3 -- ce3
 ipv4 address 100.1.0.109/30
 ipv6 address 2001:cafe:1:1b::1/64
!

!
router isis bb
 is-type level-2-only
 net 49.0001.0001.6400.0010.00
 address-family ipv4 unicast
  metric-style wide
 !
 interface Loopback0
  passive
  address-family ipv4 unicast
 !
!
 interface GigabitEthernet0/0/0/2
  point-to-point
  address-family ipv4 unicast
   metric 1000 level 2
  !

!
mpls ldp
 log
  neighbor
 !
 igp sync delay on-session-up 20
 router-id 100.0.0.16
 session protection
 address-family ipv4
  discovery targeted-hello accept
  label
   local
    allocate for host-routes
   !
  !
 !
 interface GigabitEthernet0/0/0/2

!
router bgp 1
 bgp router-id 100.0.0.16
 bgp graceful-restart
 bgp log neighbor changes detail
!
 address-family ipv4 unicast
!
 address-family vpnv4 unicast
!
 address-family vpnv6 unicast
!
 address-family l2vpn vpls-vpws
!

!
 session-group RR_SESSION
  remote-as 1
  update-source Loopback0
!
 neighbor-group RR
  use session-group RR_SESSION
!
 address-family ipv4 unicast
!
 address-family vpnv4 unicast
!
 address-family vpnv6 unicast
!
 address-family l2vpn vpls-vpws
!

!
 neighbor 100.0.0.4
  use neighbor-group RR
 !
